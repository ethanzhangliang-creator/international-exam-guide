<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>三大考试局复习手册 Skill 介绍动画</title>
  <style>
    html,
    body,
    #root {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #080b10;
      font-family: -apple-system, "SF Pro Text", "PingFang SC", "Noto Sans SC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    .stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      color: #f8faf7;
      background:
        radial-gradient(circle at 18% 14%, rgba(26, 94, 118, 0.28), transparent 26%),
        radial-gradient(circle at 78% 20%, rgba(190, 71, 80, 0.22), transparent 24%),
        linear-gradient(135deg, #091018 0%, #111926 52%, #0f1319 100%);
    }

    .grid-lines {
      position: absolute;
      inset: 0;
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent, black 12%, black 82%, transparent);
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.13;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.02), rgba(255,255,255,0.02) 1px, transparent 1px, transparent 4px);
      pointer-events: none;
    }

    .scene {
      position: absolute;
      inset: 0;
      padding: 88px 110px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: #9ed9d1;
      font-size: 24px;
      font-weight: 720;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .kicker::before {
      content: "";
      width: 48px;
      height: 2px;
      background: #d89b33;
      display: block;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .headline {
      margin-top: 34px;
      max-width: 1280px;
      font-size: 78px;
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 820;
      color: #ffffff;
    }

    .lead {
      margin-top: 30px;
      max-width: 820px;
      font-size: 30px;
      line-height: 1.55;
      color: rgba(246, 248, 244, 0.78);
    }

    .hero-board-row {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 116px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
    }

    .board-card {
      min-height: 250px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 26px 80px rgba(0,0,0,0.32);
      padding: 34px;
      position: relative;
      overflow: hidden;
    }

    .board-card::after {
      content: "";
      position: absolute;
      left: 34px;
      right: 34px;
      top: 28px;
      height: 5px;
      background: var(--accent);
    }

    .board-card strong {
      display: block;
      margin-top: 34px;
      font-size: 40px;
      line-height: 1.1;
      color: #fff;
    }

    .board-card span {
      display: block;
      margin-top: 16px;
      font-size: 24px;
      line-height: 1.35;
      color: rgba(246, 248, 244, 0.72);
    }

    .board-card .status {
      position: absolute;
      right: 28px;
      bottom: 26px;
      font-size: 18px;
      font-weight: 800;
      color: #091018;
      background: var(--accent);
      padding: 10px 14px;
      border-radius: 0;
    }

    .orbit {
      position: absolute;
      right: 96px;
      top: 96px;
      width: 410px;
      height: 410px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      opacity: 0.72;
    }

    .orbit::before,
    .orbit::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      inset: 54px;
    }

    .orbit::after {
      inset: 116px;
      background: radial-gradient(circle, rgba(216,155,51,0.5), transparent 62%);
    }

    .choice-grid {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 104px;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 42px;
      align-items: stretch;
    }

    .control-panel {
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(8, 12, 18, 0.72);
      padding: 32px;
      display: grid;
      gap: 18px;
      box-shadow: 0 30px 90px rgba(0,0,0,0.36);
    }

    .choice-row {
      min-height: 78px;
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 26px;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 18px 20px;
      background: rgba(255,255,255,0.055);
    }

    .choice-row b {
      color: #e4ba68;
      font-size: 22px;
      font-family: "Consolas", "SFMono-Regular", monospace;
    }

    .choice-row span {
      color: rgba(255,255,255,0.84);
      font-size: 25px;
      line-height: 1.35;
    }

    .source-stack {
      position: relative;
      min-height: 484px;
      border: 1px solid rgba(255,255,255,0.16);
      background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.045));
      overflow: hidden;
      padding: 34px;
    }

    .source-card {
      position: absolute;
      width: 560px;
      height: 320px;
      padding: 24px;
      background: #f6f5ef;
      color: #162234;
      box-shadow: 0 28px 65px rgba(0,0,0,0.32);
      border: 1px solid rgba(0,0,0,0.12);
    }

    .source-card h3 {
      font-size: 28px;
      color: #172b44;
    }

    .fake-lines {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }

    .fake-lines i {
      display: block;
      height: 12px;
      background: #d9ded9;
    }

    .fake-lines i:nth-child(2) { width: 76%; background: #be4750; }
    .fake-lines i:nth-child(3) { width: 88%; }
    .fake-lines i:nth-child(4) { width: 62%; background: #d89b33; }

    .provider-system {
      position: absolute;
      left: 110px;
      right: 110px;
      top: 258px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }

    .provider-column {
      min-height: 510px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.075);
      padding: 34px;
      position: relative;
      overflow: hidden;
    }

    .provider-column .tag {
      display: inline-flex;
      color: #101721;
      background: var(--accent);
      font-weight: 850;
      padding: 10px 14px;
      font-size: 18px;
    }

    .provider-column h3 {
      margin-top: 26px;
      font-size: 40px;
      color: white;
      line-height: 1.1;
    }

    .provider-column ul {
      margin: 30px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 18px;
      color: rgba(255,255,255,0.78);
      font-size: 24px;
      line-height: 1.38;
    }

    .provider-column li {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 14px;
    }

    .provider-column li::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-top: 11px;
      background: var(--accent);
    }

    .sample-scene {
      display: grid;
      grid-template-columns: 0.86fr 1.14fr;
      gap: 48px;
      align-items: center;
      height: 100%;
    }

    .sample-copy {
      padding-top: 80px;
    }

    .stat-list {
      margin-top: 42px;
      display: grid;
      gap: 18px;
      max-width: 620px;
    }

    .stat {
      display: grid;
      grid-template-columns: 112px 1fr;
      align-items: baseline;
      gap: 18px;
      border-bottom: 1px solid rgba(255,255,255,0.13);
      padding-bottom: 16px;
    }

    .stat b {
      color: #e4ba68;
      font-size: 48px;
      line-height: 1;
    }

    .stat span {
      color: rgba(255,255,255,0.74);
      font-size: 23px;
      line-height: 1.3;
    }

    .screenshot-wall {
      position: relative;
      height: 760px;
    }

    .shot {
      position: absolute;
      width: 720px;
      border: 10px solid #f7f6f1;
      box-shadow: 0 34px 90px rgba(0,0,0,0.43);
      background: #fff;
    }

    .shot img {
      display: block;
      width: 100%;
      height: auto;
    }

    .visual-routing {
      position: absolute;
      left: 110px;
      right: 110px;
      top: 250px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 28px;
    }

    .route-card {
      min-height: 440px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.078);
      padding: 32px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 24px;
    }

    .route-card h3 {
      font-size: 35px;
      color: white;
    }

    .route-visual {
      display: grid;
      align-items: center;
      justify-items: center;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(4,8,12,0.36);
      min-height: 210px;
    }

    .route-card p {
      color: rgba(255,255,255,0.76);
      font-size: 24px;
      line-height: 1.38;
    }

    .svg-diagram {
      width: 238px;
      height: 142px;
      position: relative;
    }

    .svg-diagram::before {
      content: "";
      position: absolute;
      inset: 14px 20px;
      border-left: 5px solid #f7f6f1;
      border-bottom: 5px solid #f7f6f1;
    }

    .svg-diagram span {
      position: absolute;
      bottom: 26px;
      width: 36px;
      background: #d89b33;
    }

    .svg-diagram span:nth-child(1) { left: 54px; height: 42px; }
    .svg-diagram span:nth-child(2) { left: 104px; height: 74px; background: #4fa394; }
    .svg-diagram span:nth-child(3) { left: 154px; height: 104px; background: #be4750; }

    .queue-lines {
      width: 290px;
      display: grid;
      gap: 14px;
    }

    .queue-lines i {
      height: 18px;
      background: rgba(255,255,255,0.22);
    }

    .queue-lines i:nth-child(1) { width: 92%; background: #d89b33; }
    .queue-lines i:nth-child(2) { width: 72%; }
    .queue-lines i:nth-child(3) { width: 100%; background: #4fa394; }
    .queue-lines i:nth-child(4) { width: 58%; }

    .model-grid {
      display: grid;
      gap: 12px;
      width: 300px;
    }

    .model-grid span {
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 22px;
      padding: 14px;
      text-align: center;
    }

    .final-lockup {
      position: absolute;
      left: 110px;
      right: 110px;
      top: 170px;
      display: grid;
      grid-template-columns: 1fr 0.82fr;
      gap: 54px;
      align-items: center;
    }

    .deliverable {
      border: 1px solid rgba(255,255,255,0.16);
      background: #f7f6f1;
      min-height: 600px;
      color: #172234;
      padding: 42px;
      box-shadow: 0 36px 100px rgba(0,0,0,0.36);
      transform: rotate(-1.5deg);
    }

    .deliverable h3 {
      font-size: 36px;
      color: #172234;
    }

    .deliverable .bar {
      height: 10px;
      width: 84%;
      background: #be4750;
      margin-top: 28px;
    }

    .deliverable .paper-grid {
      margin-top: 34px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .paper-box {
      min-height: 132px;
      border: 1px solid #d4d9d2;
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    .paper-box b {
      color: #17324d;
      font-size: 20px;
    }

    .paper-box i {
      display: block;
      height: 9px;
      background: #d9ded9;
    }

    .paper-box i:nth-child(3) {
      width: 72%;
      background: #d89b33;
    }

    .footer-mark {
      position: absolute;
      left: 110px;
      right: 110px;
      bottom: 42px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255,255,255,0.48);
      font-size: 18px;
      letter-spacing: 0.02em;
    }

    .progress-line {
      width: 520px;
      height: 3px;
      background: rgba(255,255,255,0.15);
      overflow: hidden;
    }

    .progress-line span {
      display: block;
      height: 100%;
      width: var(--p);
      background: #d89b33;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="video.jsx"></script>
</body>
</html>
